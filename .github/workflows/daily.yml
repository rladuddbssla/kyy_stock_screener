name: Daily Stock Screener

on:
  schedule:
    # 매일 오전 6시 (KST = UTC+9, 즉 UTC 21:00 전날)
    - cron: '0 21 * * 0-4'
  workflow_dispatch:   # 수동 실행 버튼도 활성화

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pykrx pandas finance-datareader

      - name: 스크리너 실행
        run: python screener.py

      - name: index.html 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "📈 Daily update: $(date +'%Y-%m-%d')"
          git push
